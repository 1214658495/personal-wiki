<!DOCTYPE html>
<html lang="zh-CN" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>文章阅读 — My Wiki</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Noto+Sans+SC:wght@300;400;500;700&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet" />
  
  <!-- highlight.js CSS (A11y Dark) -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/a11y-dark.min.css" id="hljsTheme">
  
  <link rel="stylesheet" href="style.css" />
</head>
<body class="article-page">

  <!-- ========== NAVIGATION ========== -->
  <nav class="navbar scrolled" id="navbar">
    <div class="nav-inner">
      <a href="index.html" class="nav-logo">
        <span class="logo-icon">⟨/⟩</span>
        <span class="logo-text">My Wiki</span>
      </a>
      <ul class="nav-links">
        <li><a href="index.html#knowledge" class="nav-link">知识库</a></li>
        <li><a href="index.html#insights" class="nav-link">心得</a></li>
        <li><a href="index.html#skills" class="nav-link">技能</a></li>
      </ul>
      <div class="nav-actions">
        <button class="icon-btn" id="themeToggleBtn" aria-label="切换主题">
          <svg class="sun-icon" style="display:none;" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.2 4.2l1.4 1.4M18.4 18.4l1.4 1.4M1 12h2M21 12h2M4.2 19.8l1.4-1.4M18.4 5.6l1.4-1.4"/></svg>
          <svg class="moon-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z"/></svg>
        </button>
      </div>
    </div>
  </nav>

  <!-- ========== ARTICLE CONTENT ========== -->
  <main class="section article-section" style="padding-top: 120px; min-height: 80vh;">
    <div class="container" style="max-width: 860px;">
      
      <a href="index.html" class="back-link">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
        返回首页
      </a>

      <!-- Loading State -->
      <div id="loader" class="article-loader">
        <div class="btn-loading" style="display: block; margin: 40px auto;"></div>
        <p style="text-align: center; color: var(--text-muted); margin-top: 20px;">正在加载文章...</p>
      </div>

      <!-- Error State -->
      <div id="errorBox" class="article-error" style="display: none; text-align: center; padding: 60px 0;">
        <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="var(--text-muted)" stroke-width="2" style="margin-bottom: 16px;"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
        <h2 style="margin-bottom: 12px;">未能找到该文章</h2>
        <p style="color: var(--text-muted); margin-bottom: 24px;">可能是因为你没有使用 HTTP 服务器运行，或者文章路径不正确。</p>
        <a href="index.html" class="btn btn-outline">返回首页</a>
      </div>

      <!-- Markdown Output -->
      <article id="markdown-content" class="markdown-body" style="display: none;">
        <!-- Markdown HTML injected here -->
      </article>

    </div>
  </main>

  <hr class="divider" />

  <!-- ========== FOOTER ========== -->
  <footer class="footer">
    <div class="container">
      <div class="footer-bottom" style="border-top: none; padding-top: 0; justify-content: center;">
        <span>© <span id="footer-year"></span> My Wiki. All rights reserved.</span>
      </div>
    </div>
  </footer>

  <!-- ========== SIDE TOOLS ========== -->
  <div class="side-tools">
    <button class="tool-btn" id="goTopBtn" title="回到顶部">↑</button>
  </div>

  <!-- CDN Scripts -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/12.0.1/marked.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>

  <script src="script.js"></script>
  <script src="article.js"></script>
</body>
</html>
